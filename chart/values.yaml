global:
  # -- Registry prepended to chart-managed images when an image-specific registry is not set.
  registry: ""
  # -- Image pull secrets applied to Unifabric controller and agent pods.
  imagePullSecrets: []

# -- Kubernetes Node label keys used for topology-aware scheduling and topology integrations.
topologyLabels:
  # -- Label key for the scale-up topology domain on a node.
  scaleUp: unifabric.io/scale-up

  # -- Label key for the leaf-level scale-out topology domain on a node.
  scaleOutLeaf: unifabric.io/scale-out-leaf

  # -- Label key for the spine-level scale-out topology domain on a node.
  scaleOutSpine: unifabric.io/scale-out-spine

  # -- Label key for the core-level scale-out topology domain on a node.
  scaleOutCore: unifabric.io/scale-out-core

# -- Controls whether the built-in Unifabric topology label writer writes discovered topology to Kubernetes Node labels.
internalTopologyLabelWriter:
  # -- Let Unifabric write and clean topology Node labels internally. Disable when another component, such as NVIDIA Topograph, owns topology labels.
  enabled: true

# -- Controls the format of topology group values written to Kubernetes Node labels.
topologyGroupNaming:
  # -- Format for topology label values. Use name for readable switch-based values, or hash for compact stable values.
  labelValueFormat: hash
  # -- Number of hash characters used when labelValueFormat is hash.
  hashLength: 7

# -- Controls switch-agent discovery from Switch resources.
switchTopologyDiscovery:
  # -- Enable controller-to-switch-agent subscriptions for switch-side topology discovery.
  enabled: false
  # -- Timeout for one controller-to-switch-agent gRPC dial attempt.
  dialTimeout: 5s
  # -- Delay before retrying a disconnected switch-agent stream.
  reconnectBackoff: 30s
  # -- Maximum gRPC message size accepted from switch-agent topology snapshots, in bytes.
  maxRecvMsgSize: 4194304
  # -- gRPC keepalive interval for controller-to-switch-agent streams.
  keepaliveTime: 30s
  # -- Default gRPC port used when a Switch resource does not set spec.grpcPort.
  defaultGrpcPort: 8090
  # -- Switch local port name patterns ignored before topology graph construction.
  ignoreSwitchPorts:
    - mgmt*
    - Management*
    - oob*
  mtls:
    # -- Require pinned mTLS for controller-to-switch-agent streams.
    enabled: true
    # -- Generate Helm-managed pinned mTLS Secrets when they do not already exist.
    autoGenerate: true
    # -- Validity period, in days, for auto-generated mTLS certificates.
    validityDays: 36500
    # -- Secret mounted into the controller containing tls.crt, tls.key, and peer.crt.
    controllerSecretName: switch-controller-mtls-controller
    # -- Secret exported for switch agents containing tls.crt, tls.key, and peer.crt.
    switchAgentSecretName: switch-controller-mtls-agent

# -- Controls node-local RDMA interface and LLDP neighbor discovery performed by the agent.
nodeTopologyDiscovery:
  # -- Interval between agent refreshes of local RDMA interfaces and LLDP neighbors.
  refreshInterval: "1m"
  # -- Delay before the first agent scan, allowing lldpd to learn neighbors.
  initialScanDelay: "1m"
  # -- RDMA interfaces included in scale-out topology and metrics. Supports selectors such as cidr=172.17.0.0/16 or interface=eth*,!eth9.
  scaleOutInterfaceSelector: ""
  # -- RDMA interfaces classified as storage and excluded from scale-out topology. Leave empty when no dedicated storage RDMA network exists.
  storageInterfaceSelector: ""
  # -- RDMA interfaces classified as scale-up and excluded from scale-out topology. Leave empty when no dedicated scale-up RDMA network exists.
  scaleUpInterfaceSelector: ""

# -- Controls the agent RDMA metrics endpoint and scrape resources.
nodeMetrics:
  # -- Enable RDMA metrics collection and expose the agent metrics Service.
  enabled: true
  # -- Container port used by the agent metrics endpoint.
  port: 8082
  # -- HTTP path served by the agent metrics endpoint.
  path: /metrics
  # -- ServiceMonitor settings used by Prometheus Operator to scrape node metrics.
  serviceMonitor:
    # -- Create a Prometheus Operator ServiceMonitor for agent RDMA metrics.
    enabled: true
    # -- Prometheus scrape interval for agent RDMA metrics.
    interval: 15s
    # -- Prometheus scrape timeout for agent RDMA metrics.
    scrapeTimeout: 10s
    # -- HTTP path scraped by the ServiceMonitor.
    path: /metrics
    # -- Extra labels added to the ServiceMonitor for Prometheus selection.
    labels: {}
  # -- Service settings for exposing agent RDMA metrics inside the cluster.
  service:
    # -- Kubernetes Service type for agent RDMA metrics.
    type: ClusterIP
    # -- Service port used by Prometheus to scrape agent RDMA metrics.
    port: 8086

# -- Controls rendering of bundled RDMA Grafana dashboard resources.
grafanaDashboard:
  # -- Render the bundled RDMA cluster, node, pod, and workload dashboards.
  enabled: true
  # -- Dashboard resource kind. Use ConfigMap for Grafana sidecar import, or GrafanaDashboard for Grafana Operator.
  kind: GrafanaDashboard
  # -- Extra labels added to rendered dashboard resources.
  labels: {}
  # -- Allow Grafana Operator to import GrafanaDashboard resources across namespaces.
  allowCrossNamespaceImport: true
  # -- Grafana Operator instance selector for importing GrafanaDashboard resources.
  instanceSelector: {}

# -- Controls switch sFlow ingestion and ClickHouse export.
# @default -- See child values.
sflow:
  # -- Enable the sFlow collector deployment and UDP service.
  enabled: false
  # -- Number of sFlow collector replicas to run.
  replicaCount: 1
  # -- Container image settings for the sFlow collector.
  # @default -- See child values.
  image:
    # -- Container image registry for the sFlow collector.
    registry: ghcr.io
    # -- Container image repository for the sFlow collector.
    repository: unifabric-io/unifabric-sflow
    # -- Container image tag for the sFlow collector. Defaults to the chart appVersion when empty.
    tag: ""
    # -- Container image pull policy for the sFlow collector.
    pullPolicy: IfNotPresent
  # -- ServiceAccount settings for the sFlow collector.
  # @default -- See child values.
  serviceAccount:
    # -- Create a dedicated ServiceAccount for the sFlow collector.
    create: true
    # -- ServiceAccount name for the sFlow collector. Defaults to the release-derived name when empty.
    name: ""
    # -- Additional annotations added to the sFlow collector ServiceAccount.
    annotations: {}
  # -- Additional annotations added to the sFlow collector Pod.
  podAnnotations: {}
  # -- Additional labels added to the sFlow collector Pod.
  podLabels: {}
  # -- Node selector applied to the sFlow collector Pod.
  nodeSelector: {}
  # -- Tolerations applied to the sFlow collector Pod.
  tolerations: []
  # -- Affinity rules applied to the sFlow collector Pod.
  affinity: {}
  # -- Pod security context applied to the sFlow collector Pod.
  # @default -- See child values.
  podSecurityContext:
    # -- Run the sFlow collector as a non-root user.
    runAsNonRoot: true
    # -- User ID used by the sFlow collector container.
    runAsUser: 65532
    # -- Group ID used by the sFlow collector container.
    runAsGroup: 65532
    # -- Filesystem group ID used by the sFlow collector Pod.
    fsGroup: 65532
    # -- Seccomp profile applied to the sFlow collector Pod.
    # @default -- See child values.
    seccompProfile:
      # -- Seccomp profile type applied to the sFlow collector Pod.
      type: RuntimeDefault
  # -- Container security context applied to the sFlow collector container.
  # @default -- See child values.
  containerSecurityContext:
    # -- Allow privilege escalation in the sFlow collector container.
    allowPrivilegeEscalation: false
    # -- Mount the sFlow collector root filesystem as read-only.
    readOnlyRootFilesystem: true
    # -- Linux capabilities settings for the sFlow collector container.
    # @default -- See child values.
    capabilities:
      # -- Linux capabilities dropped from the sFlow collector container.
      drop:
        - ALL
  # -- Resource requests and limits for the sFlow collector container.
  # @default -- See child values.
  resources:
    # -- Resource requests for the sFlow collector container.
    # @default -- See child values.
    requests:
      # -- CPU requested by the sFlow collector container.
      cpu: 100m
      # -- Memory requested by the sFlow collector container.
      memory: 128Mi
    # -- Resource limits for the sFlow collector container.
    # @default -- See child values.
    limits:
      # -- CPU limit for the sFlow collector container.
      cpu: 500m
      # -- Memory limit for the sFlow collector container.
      memory: 512Mi
  # -- UDP listener settings for the sFlow collector.
  # @default -- See child values.
  listen:
    # -- UDP bind address used by the sFlow collector container.
    bindAddress: ":6343"
    # -- UDP container port used by the sFlow collector.
    port: 6343
  # -- Prometheus metrics settings for the sFlow collector.
  # @default -- See child values.
  metrics:
    # -- Metrics bind address used by the sFlow collector.
    bindAddress: ":8084"
    # -- Metrics container port exposed by the sFlow collector.
    port: 8084
    # -- Metrics path exposed by the sFlow collector.
    path: /metrics
  # -- Health probe settings for the sFlow collector.
  # @default -- See child values.
  healthProbe:
    # -- Health probe bind address used by the sFlow collector.
    bindAddress: ":8085"
    # -- Health probe container port exposed by the sFlow collector.
    port: 8085
  # -- UDP Service settings for switch sFlow exporters.
  # @default -- See child values.
  service:
    # -- Enable the UDP Service for switch sFlow exporters.
    enabled: true
    # -- Service type used for switch sFlow exporters. NodePort is the default because sFlow datagrams usually arrive from switches outside the cluster.
    type: NodePort
    # -- UDP Service port used by switch sFlow exporters.
    port: 6343
    # -- Optional UDP nodePort used by switch sFlow exporters. Set to 0 to let Kubernetes allocate one.
    nodePort: 0
    # -- Additional annotations added to the sFlow UDP Service.
    annotations: {}
  # -- Runtime configuration for the sFlow collector.
  # @default -- See child values.
  config:
    # -- Log level used by the sFlow collector.
    logLevel: info
  # -- ClickHouse settings used by the sFlow collector.
  # @default -- See child values.
  clickhouse:
    # -- ClickHouse native protocol address used by the sFlow collector.
    address: ""
    # -- ClickHouse database containing the flows_raw table.
    database: default
    # -- ClickHouse username used by the sFlow collector.
    username: default
    # -- Inline ClickHouse password. Prefer passwordSecret for production installs.
    password: ""
    # -- Existing Secret reference for the ClickHouse password.
    # @default -- See child values.
    passwordSecret:
      # -- Secret name containing the ClickHouse password.
      name: ""
      # -- Secret key containing the ClickHouse password. Defaults to "password" when a Secret name is provided.
      key: ""
    # -- ClickHouse table that stores enriched sFlow rows.
    table: flows_raw
    # -- Managed ClickHouse deployment settings for sFlow flow records.
    # @default -- See child values.
    managed:
      # -- Deploy a single-node ClickHouse instance for sFlow flow records.
      enabled: false
      # -- Container image settings for the managed ClickHouse server.
      # @default -- See child values.
      image:
        # -- Container image registry for the managed ClickHouse server.
        registry: docker.io
        # -- Container image repository for the managed ClickHouse server.
        repository: clickhouse/clickhouse-server
        # -- Container image tag for the managed ClickHouse server.
        tag: "26.3"
        # -- Container image pull policy for the managed ClickHouse server.
        pullPolicy: IfNotPresent
      # -- Service settings for the managed ClickHouse server.
      # @default -- See child values.
      service:
        # -- Native protocol port exposed by the managed ClickHouse Service.
        nativePort: 9000
        # -- HTTP port exposed by the managed ClickHouse Service.
        httpPort: 8123
      # -- Persistence settings for the managed ClickHouse server.
      # @default -- See child values.
      persistence:
        # -- Persist managed ClickHouse data. When false, data uses emptyDir.
        enabled: true
        # -- Persistence backend for managed ClickHouse data when enabled. Supported values: pvc, hostPath.
        type: pvc
        # -- StorageClass for the managed ClickHouse PVC. Empty uses the cluster default.
        storageClassName: ""
        # -- Requested size for managed ClickHouse data.
        size: 20Gi
        # -- Access modes for the managed ClickHouse PVC.
        accessModes:
          - ReadWriteOnce
        # -- HostPath settings used when persistence.type=hostPath.
        # @default -- See child values.
        hostPath:
          # -- Host path used when persistence.type=hostPath. The ClickHouse Pod must stay on a node that has this path.
          path: ""
          # -- Kubernetes hostPath type used when persistence.type=hostPath.
          type: DirectoryOrCreate
      # -- Additional annotations added to the managed ClickHouse Pod.
      podAnnotations: {}
      # -- Additional labels added to the managed ClickHouse Pod.
      podLabels: {}
      # -- Node selector applied to the managed ClickHouse Pod.
      nodeSelector: {}
      # -- Tolerations applied to the managed ClickHouse Pod.
      tolerations: []
      # -- Affinity rules applied to the managed ClickHouse Pod.
      affinity: {}
      # -- Pod security context applied to the managed ClickHouse Pod.
      podSecurityContext: {}
      # -- Container security context applied to the managed ClickHouse container.
      containerSecurityContext: {}
      # -- Resource requests and limits for the managed ClickHouse container.
      # @default -- See child values.
      resources:
        # -- Resource requests for the managed ClickHouse container.
        # @default -- See child values.
        requests:
          # -- CPU requested by the managed ClickHouse container.
          cpu: 500m
          # -- Memory requested by the managed ClickHouse container.
          memory: 1Gi
        # -- Resource limits for the managed ClickHouse container.
        # @default -- See child values.
        limits:
          # -- CPU limit for the managed ClickHouse container.
          cpu: "2"
          # -- Memory limit for the managed ClickHouse container.
          memory: 4Gi
    # -- Schema reconciliation settings for the ClickHouse flows_raw table.
    # @default -- See child values.
    schema:
      # -- Retention window in days for the flows_raw table. Must be at least 1. The collector reconciles this table TTL during startup.
      retentionDays: 3
      # -- Kubernetes Lease settings used to serialize schema migrations.
      # @default -- See child values.
      lock:
        # -- Kubernetes Lease name used to serialize ClickHouse schema migrations across sFlow replicas.
        name: unifabric-sflow-clickhouse-schema
        # -- Kubernetes namespace for the schema migration Lease. Defaults to the chart release namespace in rendered config.
        namespace: ""
        # -- Duration before another sFlow replica can take over a stale schema migration Lease.
        leaseDuration: 10s
        # -- Retry interval used while waiting for the schema migration Lease.
        retryInterval: 2s
  # -- ClickHouse writer batching and queue settings for sFlow records.
  # @default -- See child values.
  writer:
    # -- Maximum sFlow records per ClickHouse write batch.
    batchSize: 2000
    # -- Maximum delay before flushing a non-empty write batch.
    flushInterval: 2s
    # -- Maximum records buffered before overload drops begin.
    queueSize: 65536

controller:
  # -- Deploy the Unifabric controller.
  enabled: true
  # -- Number of controller replicas.
  replicaCount: 1
  image:
    # -- Container image registry for the controller.
    registry: ghcr.io
    # -- Container image repository for the controller.
    repository: unifabric-io/unifabric-controller
    # -- Container image tag for the controller. Defaults to the chart appVersion when empty.
    tag: ""
    # -- Image pull policy for the controller container.
    pullPolicy: IfNotPresent
  serviceAccount:
    # -- Create a ServiceAccount for the controller.
    create: true
    # -- Controller ServiceAccount name. Defaults to the generated controller name when empty.
    name: ""
    # -- Annotations added to the controller ServiceAccount.
    annotations: {}
  # -- Annotations added to controller pods.
  podAnnotations: {}
  # -- Extra labels added to controller pods.
  podLabels: {}
  # -- Node selector for scheduling controller pods.
  nodeSelector: {}
  # -- Tolerations for scheduling controller pods.
  tolerations: []
  # -- Affinity rules for scheduling controller pods.
  affinity: {}
  podSecurityContext:
    # -- Run the controller pod as a non-root user.
    runAsNonRoot: true
    # -- User ID used by controller containers.
    runAsUser: 65532
    # -- Group ID used by controller containers.
    runAsGroup: 65532
    # -- Filesystem group ID used by mounted controller volumes.
    fsGroup: 65532
    seccompProfile:
      # -- Seccomp profile applied to controller pods.
      type: RuntimeDefault
  containerSecurityContext:
    # -- Prevent privilege escalation in the controller container.
    allowPrivilegeEscalation: false
    # -- Mount the controller container root filesystem as read-only.
    readOnlyRootFilesystem: true
    capabilities:
      # -- Linux capabilities dropped from the controller container.
      drop:
        - ALL
  resources:
    requests:
      # -- Controller CPU request.
      cpu: 100m
      # -- Controller memory request.
      memory: 128Mi
    limits:
      # -- Controller CPU limit.
      cpu: 500m
      # -- Controller memory limit.
      memory: 512Mi
  ports:
    # -- Controller metrics container port.
    metrics: 8080
    # -- Controller health probe container port.
    health: 8081
  service:
    # -- Create a Service for the controller metrics endpoint.
    enabled: true
    # -- Kubernetes Service type for the controller metrics endpoint.
    type: ClusterIP
    # -- Service port for controller metrics.
    port: 8080
  config:
    # -- Controller log level. Valid values are debug, info, warn, and error.
    logLevel: info
    metrics:
      # -- Controller metrics bind address inside the container.
      bindAddress: ":8080"
    healthProbe:
      # -- Controller health and readiness bind address inside the container.
      bindAddress: ":8081"
    pprof:
      # -- Controller pprof bind address. Leave empty to disable pprof.
      bindAddress: ""
    leaderElection:
      # -- Enable Kubernetes leader election for the controller.
      enabled: true
      # -- Namespace used for leader election leases. Empty uses the release namespace.
      namespace: ""
      # -- Leader election lease identifier.
      id: unifabric-controller

agent:
  # -- Deploy the Unifabric node agent DaemonSet.
  enabled: true
  image:
    # -- Container image registry for the agent.
    registry: ghcr.io
    # -- Container image repository for the agent.
    repository: unifabric-io/unifabric-agent
    # -- Container image tag for the agent. Defaults to the chart appVersion when empty.
    tag: ""
    # -- Image pull policy for the agent container.
    pullPolicy: IfNotPresent
  serviceAccount:
    # -- Create a ServiceAccount for the agent.
    create: true
    # -- Agent ServiceAccount name. Defaults to the generated agent name when empty.
    name: ""
    # -- Annotations added to the agent ServiceAccount.
    annotations: {}
  # -- Annotations added to agent pods.
  podAnnotations: {}
  # -- Extra labels added to agent pods.
  podLabels: {}
  # -- Node selector for scheduling agent pods.
  nodeSelector: {}
  # -- Tolerations for scheduling agent pods.
  tolerations: []
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/os
                operator: In
                values:
                  - linux
  # -- Run agent pods in the host network namespace.
  hostNetwork: true
  # -- Run agent pods in the host PID namespace.
  hostPID: true
  podSecurityContext:
    seccompProfile:
      # -- Seccomp profile applied to agent pods.
      type: RuntimeDefault
  containerSecurityContext:
    # -- Run the agent container as privileged so it can inspect host RDMA and network state.
    privileged: true
  resources:
    requests:
      # -- Agent CPU request.
      cpu: 100m
      # -- Agent memory request.
      memory: 128Mi
    limits:
      # -- Agent CPU limit.
      cpu: 500m
      # -- Agent memory limit.
      memory: 512Mi
  ports:
    # -- Agent metrics container port.
    metrics: 8082
    # -- Agent health probe container port.
    health: 8083
  config:
    # -- Agent log level. Valid values are debug, info, warn, and error.
    logLevel: info
    metrics:
      # -- Agent metrics bind address inside the container.
      bindAddress: ":8082"
    healthProbe:
      # -- Agent health and readiness bind address inside the container.
      bindAddress: ":8083"
    node:
      # -- Kubernetes node name override. Leave empty to use the pod NODE_NAME environment value.
      name: ""
      # -- Agent node role. Valid values are gpu and storage.
      role: gpu
      # -- host:port used to infer the default route when classifying local interfaces.
      defaultRouteProbe: "8.8.8.8:53"
  lldp:
    # -- Run the lldpd sidecar used by the agent to collect LLDP neighbors.
    enabled: true
    image:
      # -- Container image registry for lldpd.
      registry: ghcr.io
      # -- Container image repository for lldpd.
      repository: unifabric-io/unifabric-agent
      # -- Container image tag for lldpd. Defaults to the chart appVersion when empty.
      tag: ""
      # -- Image pull policy for the lldpd sidecar.
      pullPolicy: IfNotPresent
    # -- lldpd management IP pattern written to lldpd.conf. Leave empty to let lldpd choose.
    managementIPPattern: ""
    # -- Interface pattern passed to lldpd for LLDP discovery. Leave empty to let lldpd use its defaults.
    interfaces: ""
    # -- LLDP transmit interval, in seconds, configured for lldpd.
    txInterval: 30
    # -- Additional raw lldpd configuration appended to lldpd.conf.
    extraConfig: ""
    containerSecurityContext:
      # -- Run the lldpd sidecar as privileged so it can access host network interfaces.
      privileged: true
    resources:
      requests:
        # -- lldpd sidecar CPU request.
        cpu: 50m
        # -- lldpd sidecar memory request.
        memory: 64Mi
      limits:
        # -- lldpd sidecar CPU limit.
        cpu: 100m
        # -- lldpd sidecar memory limit.
        memory: 128Mi

nvidiaTopograph:
  # -- Deploy the NVIDIA Topograph integration rendered by this chart.
  enable: false
  # -- Provider settings passed to node-observer.
  provider:
    # -- Topograph provider name, such as infiniband-k8s or netq.
    name: infiniband-k8s
    # -- Provider-specific parameters passed to NVIDIA Topograph components.
    params:
      # -- Use the GPU Operator clique label as the accelerator topology source for infiniband-k8s.
      useGpuCliqueLabel: true
  # -- Engine settings passed to node-observer.
  engine:
    # -- Topograph engine name used by node-observer.
    name: k8s
  # -- Service settings for the topograph HTTP API.
  service:
    # -- Kubernetes Service type for the topograph HTTP API.
    type: ClusterIP
  # -- Image pull secrets applied to NVIDIA Topograph workloads. Defaults to global.imagePullSecrets when empty.
  imagePullSecrets: []
  topograph:
    # -- Number of topograph API replicas.
    replicaCount: 1
    image:
      # -- Container image registry for the topograph API.
      registry: ghcr.io
      # -- Container image repository for the topograph API.
      repository: nvidia/topograph
      # -- Container image tag for the topograph API.
      tag: v0.5.0
      # -- Image pull policy for the topograph API container.
      pullPolicy: IfNotPresent
    # -- Existing topograph Service name used by node-observer. Leave empty to use the chart-managed Service.
    serviceName: ""
    # -- Verbosity level passed to the topograph API process.
    verbosity: 3
    # -- Extra environment variables added to the topograph API container.
    env: {}
    # -- Runtime configuration written to topograph-config.yaml.
    config:
      # -- Delay used by topograph to aggregate topology generation requests.
      requestAggregationDelay: 15s
      # -- Secret containing provider credentials for topograph. The Secret must include credentials.yaml by default.
      credentialsSecret: ""
      # -- Credentials file path written to topograph-config.yaml. Defaults to /etc/topograph/credentials/credentials.yaml when credentialsSecret is set.
      credentialsPath: ""
    # -- Annotations added to topograph API pods.
    podAnnotations: {}
    # -- Extra labels added to topograph API pods.
    podLabels: {}
    # -- Pod security context for topograph API pods.
    podSecurityContext: {}
    # -- Container security context for the topograph API container.
    securityContext: {}
    resources:
      limits:
        # -- Topograph API CPU limit.
        cpu: 400m
        # -- Topograph API memory limit.
        memory: 512Mi
      requests:
        # -- Topograph API CPU request.
        cpu: 250m
        # -- Topograph API memory request.
        memory: 256Mi
    # -- Extra volumes added to topograph API pods.
    volumes: []
    # -- Extra volume mounts added to the topograph API container.
    volumeMounts: []
    # -- Liveness probe configuration for the topograph API container.
    livenessProbe:
      httpGet:
        # -- HTTP path used by the topograph API liveness probe.
        path: /healthz
        # -- Named port used by the topograph API liveness probe.
        port: http
    # -- Readiness probe configuration for the topograph API container.
    readinessProbe:
      httpGet:
        # -- HTTP path used by the topograph API readiness probe.
        path: /healthz
        # -- Named port used by the topograph API readiness probe.
        port: http
    # -- Node selector for scheduling topograph API pods.
    nodeSelector: {}
    # -- Tolerations for scheduling topograph API pods.
    tolerations: []
    # -- Affinity rules for scheduling topograph API pods.
    affinity: {}
    serviceMonitor:
      # -- Create a Prometheus Operator ServiceMonitor for the topograph API.
      enabled: false
      # -- Namespace where the topograph ServiceMonitor is created.
      namespace: monitoring
      # -- Service port name scraped by the topograph ServiceMonitor.
      port: http
      # -- HTTP path scraped by the topograph ServiceMonitor.
      path: /metrics
      # -- Prometheus scrape interval for the topograph API.
      interval: 15s
      # -- HTTP scheme used by the topograph ServiceMonitor.
      scheme: http
  nodeObserver:
    # -- Number of node-observer replicas.
    replicaCount: 1
    image:
      # -- Container image registry for node-observer.
      registry: ghcr.io
      # -- Container image repository for node-observer.
      repository: nvidia/topograph
      # -- Container image tag for node-observer.
      tag: v0.5.0
      # -- Image pull policy for the node-observer container.
      pullPolicy: IfNotPresent
    # -- Verbosity level passed to node-observer.
    verbosity: 3
    # -- Topograph API and node-data-broker readiness inputs watched by node-observer.
    topograph:
      apiServer:
        # -- Watch the Topograph API pod and trigger topology generation when it becomes ready.
        enabled: true
        # -- Pod selector used to find the Topograph API pod. Empty uses the chart-managed API pod labels.
        podSelector: {}
        # -- Topograph API container name watched by node-observer.
        containerName: topograph
      nodeDataBroker:
        # -- Wait for node-data-broker pods before the first topology request.
        enabled: true
        # -- Pod selector used to find node-data-broker pods. Empty uses the chart-managed broker pod labels.
        podSelector: {}
        # -- node-data-broker container name watched by node-observer.
        containerName: node-data-broker
      # -- node-observer trigger configuration.
      trigger:
        # -- Node selector used by node-observer to choose Nodes that trigger topology generation.
        nodeSelector:
          nvidia.com/gpu.present: "true"
    # -- Annotations added to node-observer pods.
    podAnnotations: {}
    # -- Extra labels added to node-observer pods.
    podLabels: {}
    # -- Pod security context for node-observer pods.
    podSecurityContext: {}
    # -- Container security context for the node-observer container.
    securityContext: {}
    resources:
      limits:
