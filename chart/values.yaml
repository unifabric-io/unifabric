global:
  # -- Override the default image registry used by chart workloads when image-specific registry is empty.
  registry: ""
  imagePullSecrets: []

# -- Label keys written back to Kubernetes Nodes for discovered topology dimensions.
topologyLabels:
  # -- Label key used to mark nodes that participate in scale-up topology.
  scaleUp: unifabric.io/scale-up

  # -- Label key used to mark the leaf-level scale-out topology group of a node.
  scaleOutLeaf: unifabric.io/scale-out-leaf

  # -- Label key used to mark the spine-level scale-out topology group of a node.
  scaleOutSpine: unifabric.io/scale-out-spine

  # -- Label key used to mark the core-level scale-out topology group of a node.
  scaleOutCore: unifabric.io/scale-out-core

# -- Controls controller-side scale-out discovery derived from FabricNode topology.
scaleOutDiscovery:
  # -- Settings for ScaleOutLeafGroup discovery and Node leaf label reconciliation.
  leafGroups:
    # -- Enable ScaleOutLeafGroup discovery and Node leaf label updates.
    enabled: true

# -- Controls local node topology discovery on each agent node.
nodeTopologyDiscovery:
  # -- How often each agent refreshes local RDMA interface and LLDP neighbor state.
  refreshInterval: "1m"
  # -- Delay before the first local RDMA and LLDP topology scan, allowing lldpd to learn neighbors.
  initialScanDelay: "1m"
  # -- Select RDMA interfaces that belong to scale-out topology. Supports values like cidr=172.17.0.0/16 or interface=eth*,!eth9.
  scaleOutInterfaceSelector: ""
  # -- Select RDMA interfaces that belong to storage topology. Configure only when storage RDMA interfaces exist.
  storageInterfaceSelector: ""
  # -- Select RDMA interfaces that belong to scale-up topology. Configure only when scale-up RDMA interfaces exist; matched interfaces are excluded from FabricNode scale-out status.
  scaleUpInterfaceSelector: ""

# -- Controls node-level RDMA metrics exported by the agent.
nodeMetrics:
  # -- Enable collection of RDMA device metrics by the agent.
  enabled: true
  # -- Metrics port exposed by the node metrics endpoint.
  port: 8082
  # -- HTTP path exposed by the node metrics endpoint.
  path: /metrics
  # -- ServiceMonitor settings used by Prometheus Operator to scrape node metrics.
  serviceMonitor:
    # -- Enable creation of a ServiceMonitor for node metrics.
    enabled: true
    # -- Prometheus scrape interval for node metrics.
    interval: 15s
    # -- Prometheus scrape timeout for node metrics.
    scrapeTimeout: 10s
    # -- Metrics path used by the ServiceMonitor endpoint.
    path: /metrics
    # -- Additional labels attached to the ServiceMonitor resource.
    labels: {}
  # -- Kubernetes Service settings for exposing node metrics.
  service:
    # -- Service type used for the node metrics Service.
    type: ClusterIP
    # -- Service port exposed for node metrics scraping.
    port: 8086

# -- Controls rendering of prebuilt Grafana dashboard resources.
grafanaDashboard:
  # -- Enable rendering RDMA topology and metrics dashboards.
  enabled: true
  # -- Dashboard resource kind: ConfigMap for Grafana sidecar, or GrafanaDashboard for Grafana Operator.
  kind: GrafanaDashboard
  # -- Additional labels attached to rendered dashboard resources.
  labels: {}
  # -- Allow GrafanaDashboard resources to be imported across namespaces by Grafana Operator.
  allowCrossNamespaceImport: true
  # -- Selector used by Grafana Operator to choose Grafana instances that import dashboards.
  instanceSelector: {}

# -- Controls switch sFlow ingestion and ClickHouse export.
# @default -- See child values.
sflow:
  # -- Enable the sFlow collector deployment and UDP service.
  enabled: false
  # -- Number of sFlow collector replicas to run.
  replicaCount: 1
  # -- Container image settings for the sFlow collector.
  # @default -- See child values.
  image:
    # -- Container image registry for the sFlow collector.
    registry: ghcr.io
    # -- Container image repository for the sFlow collector.
    repository: unifabric-io/unifabric-sflow
    # -- Container image tag for the sFlow collector. Defaults to the chart appVersion when empty.
    tag: ""
    # -- Container image pull policy for the sFlow collector.
    pullPolicy: IfNotPresent
  # -- ServiceAccount settings for the sFlow collector.
  # @default -- See child values.
  serviceAccount:
    # -- Create a dedicated ServiceAccount for the sFlow collector.
    create: true
    # -- ServiceAccount name for the sFlow collector. Defaults to the release-derived name when empty.
    name: ""
    # -- Additional annotations added to the sFlow collector ServiceAccount.
    annotations: {}
  # -- Additional annotations added to the sFlow collector Pod.
  podAnnotations: {}
  # -- Additional labels added to the sFlow collector Pod.
  podLabels: {}
  # -- Node selector applied to the sFlow collector Pod.
  nodeSelector: {}
  # -- Tolerations applied to the sFlow collector Pod.
  tolerations: []
  # -- Affinity rules applied to the sFlow collector Pod.
  affinity: {}
  # -- Pod security context applied to the sFlow collector Pod.
  # @default -- See child values.
  podSecurityContext:
    # -- Run the sFlow collector as a non-root user.
    runAsNonRoot: true
    # -- User ID used by the sFlow collector container.
    runAsUser: 65532
    # -- Group ID used by the sFlow collector container.
    runAsGroup: 65532
    # -- Filesystem group ID used by the sFlow collector Pod.
    fsGroup: 65532
    # -- Seccomp profile applied to the sFlow collector Pod.
    # @default -- See child values.
    seccompProfile:
      # -- Seccomp profile type applied to the sFlow collector Pod.
      type: RuntimeDefault
  # -- Container security context applied to the sFlow collector container.
  # @default -- See child values.
  containerSecurityContext:
    # -- Allow privilege escalation in the sFlow collector container.
    allowPrivilegeEscalation: false
    # -- Mount the sFlow collector root filesystem as read-only.
    readOnlyRootFilesystem: true
    # -- Linux capabilities settings for the sFlow collector container.
    # @default -- See child values.
    capabilities:
      # -- Linux capabilities dropped from the sFlow collector container.
      drop:
        - ALL
  # -- Resource requests and limits for the sFlow collector container.
  # @default -- See child values.
  resources:
    # -- Resource requests for the sFlow collector container.
    # @default -- See child values.
    requests:
      # -- CPU requested by the sFlow collector container.
      cpu: 100m
      # -- Memory requested by the sFlow collector container.
      memory: 128Mi
    # -- Resource limits for the sFlow collector container.
    # @default -- See child values.
    limits:
      # -- CPU limit for the sFlow collector container.
      cpu: 500m
      # -- Memory limit for the sFlow collector container.
      memory: 512Mi
  # -- UDP listener settings for the sFlow collector.
  # @default -- See child values.
  listen:
    # -- UDP bind address used by the sFlow collector container.
    bindAddress: ":6343"
    # -- UDP container port used by the sFlow collector.
    port: 6343
  # -- Prometheus metrics settings for the sFlow collector.
  # @default -- See child values.
  metrics:
    # -- Metrics bind address used by the sFlow collector.
    bindAddress: ":8084"
    # -- Metrics container port exposed by the sFlow collector.
    port: 8084
    # -- Metrics path exposed by the sFlow collector.
    path: /metrics
  # -- Health probe settings for the sFlow collector.
  # @default -- See child values.
  healthProbe:
    # -- Health probe bind address used by the sFlow collector.
    bindAddress: ":8085"
    # -- Health probe container port exposed by the sFlow collector.
    port: 8085
  # -- UDP Service settings for switch sFlow exporters.
  # @default -- See child values.
  service:
    # -- Enable the UDP Service for switch sFlow exporters.
    enabled: true
    # -- Service type used for switch sFlow exporters. NodePort is the default because sFlow datagrams usually arrive from switches outside the cluster.
    type: NodePort
    # -- UDP Service port used by switch sFlow exporters.
    port: 6343
    # -- Optional UDP nodePort used by switch sFlow exporters. Set to 0 to let Kubernetes allocate one.
    nodePort: 0
    # -- Additional annotations added to the sFlow UDP Service.
    annotations: {}
  # -- Runtime configuration for the sFlow collector.
  # @default -- See child values.
  config:
    # -- Log level used by the sFlow collector.
    logLevel: info
  # -- ClickHouse settings used by the sFlow collector.
  # @default -- See child values.
  clickhouse:
    # -- ClickHouse native protocol address used by the sFlow collector.
    address: ""
    # -- ClickHouse database containing the flows_raw table.
    database: default
    # -- ClickHouse username used by the sFlow collector.
    username: default
    # -- Inline ClickHouse password. Prefer passwordSecret for production installs.
    password: ""
    # -- Existing Secret reference for the ClickHouse password.
    # @default -- See child values.
    passwordSecret:
      # -- Secret name containing the ClickHouse password.
      name: ""
      # -- Secret key containing the ClickHouse password. Defaults to "password" when a Secret name is provided.
      key: ""
    # -- ClickHouse table that stores enriched sFlow rows.
    table: flows_raw
    # -- Managed ClickHouse deployment settings for sFlow flow records.
    # @default -- See child values.
    managed:
      # -- Deploy a single-node ClickHouse instance for sFlow flow records.
      enabled: false
      # -- Container image settings for the managed ClickHouse server.
      # @default -- See child values.
      image:
        # -- Container image registry for the managed ClickHouse server.
        registry: docker.io
        # -- Container image repository for the managed ClickHouse server.
        repository: clickhouse/clickhouse-server
        # -- Container image tag for the managed ClickHouse server.
        tag: "26.3"
        # -- Container image pull policy for the managed ClickHouse server.
        pullPolicy: IfNotPresent
      # -- Service settings for the managed ClickHouse server.
      # @default -- See child values.
      service:
        # -- Native protocol port exposed by the managed ClickHouse Service.
        nativePort: 9000
        # -- HTTP port exposed by the managed ClickHouse Service.
        httpPort: 8123
      # -- Persistence settings for the managed ClickHouse server.
      # @default -- See child values.
      persistence:
        # -- Persist managed ClickHouse data. When false, data uses emptyDir.
        enabled: true
        # -- Persistence backend for managed ClickHouse data when enabled. Supported values: pvc, hostPath.
        type: pvc
        # -- StorageClass for the managed ClickHouse PVC. Empty uses the cluster default.
        storageClassName: ""
        # -- Requested size for managed ClickHouse data.
        size: 20Gi
        # -- Access modes for the managed ClickHouse PVC.
        accessModes:
          - ReadWriteOnce
        # -- HostPath settings used when persistence.type=hostPath.
        # @default -- See child values.
        hostPath:
          # -- Host path used when persistence.type=hostPath. The ClickHouse Pod must stay on a node that has this path.
          path: ""
          # -- Kubernetes hostPath type used when persistence.type=hostPath.
          type: DirectoryOrCreate
      # -- Additional annotations added to the managed ClickHouse Pod.
      podAnnotations: {}
      # -- Additional labels added to the managed ClickHouse Pod.
      podLabels: {}
      # -- Node selector applied to the managed ClickHouse Pod.
      nodeSelector: {}
      # -- Tolerations applied to the managed ClickHouse Pod.
      tolerations: []
      # -- Affinity rules applied to the managed ClickHouse Pod.
      affinity: {}
      # -- Pod security context applied to the managed ClickHouse Pod.
      podSecurityContext: {}
      # -- Container security context applied to the managed ClickHouse container.
      containerSecurityContext: {}
      # -- Resource requests and limits for the managed ClickHouse container.
      # @default -- See child values.
      resources:
        # -- Resource requests for the managed ClickHouse container.
        # @default -- See child values.
        requests:
          # -- CPU requested by the managed ClickHouse container.
          cpu: 500m
          # -- Memory requested by the managed ClickHouse container.
          memory: 1Gi
        # -- Resource limits for the managed ClickHouse container.
        # @default -- See child values.
        limits:
          # -- CPU limit for the managed ClickHouse container.
          cpu: "2"
          # -- Memory limit for the managed ClickHouse container.
          memory: 4Gi
    # -- Schema reconciliation settings for the ClickHouse flows_raw table.
    # @default -- See child values.
    schema:
      # -- Retention window in days for the flows_raw table. Must be at least 1. The collector reconciles this table TTL during startup.
      retentionDays: 3
      # -- Kubernetes Lease settings used to serialize schema migrations.
      # @default -- See child values.
      lock:
        # -- Kubernetes Lease name used to serialize ClickHouse schema migrations across sFlow replicas.
        name: unifabric-sflow-clickhouse-schema
        # -- Kubernetes namespace for the schema migration Lease. Defaults to the chart release namespace in rendered config.
        namespace: ""
        # -- Duration before another sFlow replica can take over a stale schema migration Lease.
        leaseDuration: 10s
        # -- Retry interval used while waiting for the schema migration Lease.
        retryInterval: 2s
  # -- ClickHouse writer batching and queue settings for sFlow records.
  # @default -- See child values.
  writer:
    # -- Maximum sFlow records per ClickHouse write batch.
    batchSize: 2000
    # -- Maximum delay before flushing a non-empty write batch.
    flushInterval: 2s
    # -- Maximum records buffered before overload drops begin.
    queueSize: 65536

controller:
  enabled: true
  replicaCount: 1
  image:
    # -- Container image registry for the controller.
    registry: ghcr.io
    # -- Container image repository for the controller.
    repository: unifabric-io/unifabric-controller
    # -- Container image tag for the controller. Defaults to the chart appVersion when empty.
    tag: ""
    pullPolicy: IfNotPresent
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ports:
    metrics: 8080
    health: 8081
  service:
    enabled: true
    type: ClusterIP
    port: 8080
  config:
    logLevel: info
    metrics:
      bindAddress: ":8080"
    healthProbe:
      bindAddress: ":8081"
    pprof:
      bindAddress: ""
    leaderElection:
      enabled: true
      namespace: ""
      id: unifabric-controller

agent:
  enabled: true
  image:
    # -- Container image registry for the agent.
    registry: ghcr.io
    # -- Container image repository for the agent.
    repository: unifabric-io/unifabric-agent
    # -- Container image tag for the agent. Defaults to the chart appVersion when empty.
    tag: ""
    pullPolicy: IfNotPresent
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/os
                operator: In
                values:
                  - linux
  hostNetwork: true
  hostPID: true
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    privileged: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ports:
    metrics: 8082
    health: 8083
  service:
    enabled: true
    type: ClusterIP
    port: 8082
  config:
    logLevel: info
    metrics:
      bindAddress: ":8082"
    healthProbe:
      bindAddress: ":8083"
    node:
      name: ""
      role: gpu
      defaultRouteProbe: "8.8.8.8:53"
  lldp:
    enabled: true
    image:
      # -- Container image registry for lldpd.
      registry: ghcr.io
      # -- Container image repository for lldpd.
      repository: unifabric-io/unifabric-agent
      # -- Container image tag for lldpd. Defaults to the chart appVersion when empty.
      tag: ""
      pullPolicy: IfNotPresent
    managementIPPattern: ""
    interfaces: ""
    txInterval: 30
    extraConfig: ""
    containerSecurityContext:
      privileged: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

nvidiaTopograph:
  # -- Enable the NVIDIA topograph integration rendered by this chart.
  enable: false
  # -- Provider settings for the NVIDIA topograph integration.
  provider:
    # -- Topograph provider name.
    name: infiniband-k8s
  # -- Engine settings for the NVIDIA topograph integration.
  engine:
    # -- Topograph engine name.
    name: k8s
  # -- Service settings shared by the NVIDIA topograph components.
  service:
    # -- Service type used for the topograph Service.
    type: ClusterIP
    # -- Service port used by the topograph HTTP endpoint.
    port: 49021
  # -- Image pull secrets applied to the NVIDIA topograph workloads.
  imagePullSecrets: []
  topograph:
    replicaCount: 1
    image:
      # -- Container image registry for the topograph deployment.
      registry: ghcr.io
      # -- Container image repository for the topograph deployment.
      repository: nvidia/topograph
      # -- Container image tag for the topograph deployment.
      tag: v0.3.0
      pullPolicy: IfNotPresent
    serviceName: ""
    serviceAccount:
      create: true
      automount: true
      annotations: {}
      name: ""
    verbosity: 3
    env: {}
    config:
      requestAggregationDelay: 15s
      # -- Optional Secret containing provider API credentials for topograph. By default the Secret must include a credentials.yaml key.
      credentialsSecret: ""
      # -- Optional credentials path written to topograph-config.yaml. When credentialsSecret is set and this is empty, the chart uses /etc/topograph/credentials/credentials.yaml.
      credentialsPath: ""
    podAnnotations: {}
    podLabels: {}
    podSecurityContext: {}
    securityContext: {}
    resources:
      limits:
        cpu: 400m
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi
    volumes: []
    volumeMounts: []
    livenessProbe:
      httpGet:
        path: /healthz
        port: http
    readinessProbe:
      httpGet:
        path: /healthz
        port: http
    nodeSelector: {}
    tolerations: []
    affinity: {}
    ingress:
      enabled: false
      className: ""
      annotations: {}
      hosts:
        - host: chart-example.local
          paths:
            - path: /
              pathType: ImplementationSpecific
      tls: []
    serviceMonitor:
      enabled: false
      namespace: monitoring
      port: http
      path: /metrics
      interval: 15s
      scheme: http
  nodeObserver:
    replicaCount: 1
    image:
      # -- Container image registry for the node observer deployment.
      registry: ghcr.io
      # -- Container image repository for the node observer deployment.
      repository: nvidia/topograph
      # -- Container image tag for the node observer deployment.
      tag: v0.3.0
      pullPolicy: IfNotPresent
    wait:
      image:
        # -- Container image registry for the node observer wait init container.
        registry: docker.io
        # -- Container image repository for the node observer wait init container.
        repository: curlimages/curl
        # -- Container image tag for the node observer wait init container.
        tag: 8.13.0
        pullPolicy: IfNotPresent
    serviceAccount:
      create: true
      automount: true
      annotations: {}
      name: ""
    verbosity: 3
    trigger: {}
    podAnnotations: {}
    podLabels: {}
    podSecurityContext: {}
    securityContext: {}
    resources:
      limits:
        cpu: 400m
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi
    nodeSelector: {}
    tolerations: []
    affinity: {}
  nodeDataBroker:
    enable: true
    image:
      # -- Container image registry for the node data broker DaemonSet.
      registry: ghcr.io
      # -- Container image repository for the node data broker DaemonSet.
      repository: nvidia/topograph/ib
      # -- Container image tag for the node data broker DaemonSet.
      tag: main
      pullPolicy: IfNotPresent
    command:
      - tail
      - -f
      - /dev/null
    initContainer:
      enable: true
      image:
        # -- Container image registry for the node data broker init container.
        registry: ghcr.io
        # -- Container image repository for the node data broker init container.
        repository: nvidia/topograph
        # -- Container image tag for the node data broker init container.
        tag: v0.3.0
        pullPolicy: IfNotPresent
      extraArgs:
        - gpu-operator-namespace=gpu-operator
        - device-plugin-daemonset=nvidia-device-plugin-daemonset
    serviceAccount:
      create: true
      automount: true
      annotations: {}
      name: ""
    verbosity: 3
    podAnnotations: {}
    podLabels: {}
    podSecurityContext: {}
    securityContext:
      privileged: true
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 128Mi
    volumeMounts:
      - name: sys-class
        mountPath: /sys/class
    volumes:
      - name: sys-class
        hostPath:
          path: /sys/class
          type: Directory
    nodeSelector: {}
    tolerations: []
    affinity: {}
