{{- if include "unifabric.switchMTLS.autoGenerate" . }}
{{- $controllerSecretName := include "unifabric.switchMTLS.controllerSecretName" . }}
{{- $switchAgentSecretName := include "unifabric.switchMTLS.switchAgentSecretName" . }}
{{- $existingController := lookup "v1" "Secret" .Release.Namespace $controllerSecretName }}
{{- $existingSwitchAgent := lookup "v1" "Secret" .Release.Namespace $switchAgentSecretName }}
{{- $controllerOwned := false }}
{{- if $existingController }}
{{- $controllerOwned = and (eq (dig "metadata" "labels" "app.kubernetes.io/managed-by" "" $existingController) .Release.Service) (eq (dig "metadata" "annotations" "meta.helm.sh/release-name" "" $existingController) .Release.Name) (eq (dig "metadata" "annotations" "meta.helm.sh/release-namespace" "" $existingController) .Release.Namespace) }}
{{- end }}
{{- $switchAgentOwned := false }}
{{- if $existingSwitchAgent }}
{{- $switchAgentOwned = and (eq (dig "metadata" "labels" "app.kubernetes.io/managed-by" "" $existingSwitchAgent) .Release.Service) (eq (dig "metadata" "annotations" "meta.helm.sh/release-name" "" $existingSwitchAgent) .Release.Name) (eq (dig "metadata" "annotations" "meta.helm.sh/release-namespace" "" $existingSwitchAgent) .Release.Namespace) }}
{{- end }}
{{- if or (and $existingController (not $controllerOwned)) (and $existingSwitchAgent (not $switchAgentOwned)) }}
{{- fail (printf "switch mTLS auto-generation requires Helm-owned Secrets or no pre-existing Secrets; delete stale Secrets %q and %q in namespace %q, or set switchSubscription.mtls.mode=existing to use externally managed certificates" $controllerSecretName $switchAgentSecretName .Release.Namespace) }}
{{- end }}
{{- if and $existingController $existingSwitchAgent }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $controllerSecretName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/resource-policy: keep
    meta.helm.sh/release-name: {{ .Release.Name | quote }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "unifabric.labels" . | nindent 4 }}
    app.kubernetes.io/component: unifabric-controller
type: Opaque
data:
  tls.crt: {{ index $existingController.data "tls.crt" }}
  tls.key: {{ index $existingController.data "tls.key" }}
  peer.crt: {{ index $existingController.data "peer.crt" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $switchAgentSecretName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/resource-policy: keep
    meta.helm.sh/release-name: {{ .Release.Name | quote }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "unifabric.labels" . | nindent 4 }}
    app.kubernetes.io/component: unifabric-switch-agent
type: Opaque
data:
  tls.crt: {{ index $existingSwitchAgent.data "tls.crt" }}
  tls.key: {{ index $existingSwitchAgent.data "tls.key" }}
  peer.crt: {{ index $existingSwitchAgent.data "peer.crt" }}
{{- else if or $existingController $existingSwitchAgent }}
{{- fail (printf "switch mTLS auto-generation requires both Helm-owned Secrets %q and %q to exist together; delete the remaining Secret in namespace %q so Helm can regenerate the pair" $controllerSecretName $switchAgentSecretName .Release.Namespace) }}
{{- else }}
{{- $validityDays := 106751 }}
{{- $ca := genCA (printf "%s-switch-ca" (include "unifabric.fullname" .)) $validityDays }}
{{- $controllerCert := genSignedCert $controllerSecretName (list) (list) $validityDays $ca }}
{{- $switchAgentCert := genSignedCert $switchAgentSecretName (list) (list) $validityDays $ca }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $controllerSecretName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/resource-policy: keep
    meta.helm.sh/release-name: {{ .Release.Name | quote }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "unifabric.labels" . | nindent 4 }}
    app.kubernetes.io/component: unifabric-controller
type: Opaque
data:
  tls.crt: {{ $controllerCert.Cert | b64enc }}
  tls.key: {{ $controllerCert.Key | b64enc }}
  peer.crt: {{ $switchAgentCert.Cert | b64enc }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $switchAgentSecretName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/resource-policy: keep
    meta.helm.sh/release-name: {{ .Release.Name | quote }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "unifabric.labels" . | nindent 4 }}
    app.kubernetes.io/component: unifabric-switch-agent
type: Opaque
data:
  tls.crt: {{ $switchAgentCert.Cert | b64enc }}
  tls.key: {{ $switchAgentCert.Key | b64enc }}
  peer.crt: {{ $controllerCert.Cert | b64enc }}
{{- end }}
{{- end }}
