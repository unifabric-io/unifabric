{{- if .Values.sflow.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "unifabric.sflowName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "unifabric.labels" . | nindent 4 }}
    app.kubernetes.io/component: unifabric-sflow
spec:
  replicas: {{ .Values.sflow.replicaCount }}
  selector:
    matchLabels:
      {{- include "unifabric.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: unifabric-sflow
  template:
    metadata:
      labels:
        {{- include "unifabric.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: unifabric-sflow
        {{- with .Values.sflow.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.sflow.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "unifabric.sflowServiceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.sflow.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.sflow.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.sflow.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.sflow.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: sflow
          image: {{ include "unifabric.image" (dict "root" . "image" .Values.sflow.image) }}
          imagePullPolicy: {{ .Values.sflow.image.pullPolicy }}
          args:
            - -config
            - /etc/unifabric/sflow.yaml
          ports:
            - name: sflow
              containerPort: {{ .Values.sflow.listen.port }}
              protocol: UDP
            - name: metrics
              containerPort: {{ .Values.sflow.metrics.port }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.sflow.healthProbe.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          {{- with .Values.sflow.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.sflow.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/unifabric
              readOnly: true
          command:
            - /usr/bin/unifabric/sflow
          {{- if .Values.sflow.clickhouse.passwordSecret.name }}
          env:
            - name: SFLOW_CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sflow.clickhouse.passwordSecret.name }}
                  key: {{ .Values.sflow.clickhouse.passwordSecret.key }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "unifabric.sflowName" . }}-config
            items:
              - key: sflow.yaml
                path: sflow.yaml
{{- end }}
