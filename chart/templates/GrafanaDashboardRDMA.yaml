{{- if and .Values.grafanaDashboard.enabled .Values.nodeMetrics.enabled -}}
{{- $dashboards := .Files.Glob "files/*.json" -}}
{{- range $path, $_ := $dashboards }}
{{- $file := base $path -}}
{{- $name := trimSuffix ".json" $file -}}
{{- if eq $.Values.grafanaDashboard.kind "GrafanaDashboard" }}
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: {{ printf "%s-%s" $.Release.Name $name | trunc 63 | trimSuffix "-" }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "unifabric.labels" $ | nindent 4 }}
    app.kubernetes.io/component: unifabric
    {{- with $.Values.grafanaDashboard.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  allowCrossNamespaceImport: {{ $.Values.grafanaDashboard.allowCrossNamespaceImport }}
  {{- if $.Values.grafanaDashboard.instanceSelector }}
  instanceSelector:
    {{- toYaml $.Values.grafanaDashboard.instanceSelector | nindent 4 }}
  {{- else }}
  instanceSelector: {}
  {{- end }}
  json: {{ $.Files.Get $path | toJson }}
{{- else }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-%s" $.Release.Name $name | trunc 63 | trimSuffix "-" }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "unifabric.labels" $ | nindent 4 }}
    app.kubernetes.io/component: unifabric
    grafana_dashboard: "1"
    {{- with $.Values.grafanaDashboard.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  {{ $file }}: |-
    {{- $.Files.Get $path | nindent 4 }}
{{- end }}
---
{{- end }}
{{- end }}
