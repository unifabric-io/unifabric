{{- if .Values.agent.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "unifabric.agentName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "unifabric.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      {{- include "unifabric.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        {{- include "unifabric.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent
        {{- with .Values.agent.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.agent.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "unifabric.agentServiceAccountName" . }}
      hostNetwork: {{ .Values.agent.hostNetwork }}
      hostPID: {{ .Values.agent.hostPID }}
      {{- if .Values.agent.hostNetwork }}
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agent
          image: {{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag | default .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          command:
            - /usr/bin/unifabric/agent
          args:
            - -config
            - /etc/unifabric/agent.yaml
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: metrics
              containerPort: {{ .Values.agent.ports.metrics }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.agent.ports.health }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          {{- with .Values.agent.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.agent.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/unifabric
              readOnly: true
            - name: containerd-run
              mountPath: /host/run/containerd
            - name: proc
              mountPath: /host/proc
              readOnly: true
            {{- if .Values.agent.lldp.enabled }}
            - name: lldpd-state
              mountPath: /run/
            {{- end }}
        {{- if .Values.agent.lldp.enabled }}
        - name: lldpd
          image: {{ default .Values.agent.image.repository .Values.agent.lldp.image.repository }}:{{ default (.Values.agent.image.tag | default .Chart.AppVersion) .Values.agent.lldp.image.tag }}
          imagePullPolicy: {{ default .Values.agent.image.pullPolicy .Values.agent.lldp.image.pullPolicy }}
          command:
            - /usr/bin/unifabric/entrypoint.sh
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NODE_IPADDRESS
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: LLDPD_INTERFACE_PATTERN
              value: {{ quote .Values.agent.lldp.interfaces }}
            - name: LLDPD_TX_INTERVAL
              value: {{ quote .Values.agent.lldp.txInterval }}
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - lldpcli -v
          {{- with .Values.agent.lldp.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.agent.lldp.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: lldpd-state
              mountPath: /run/
            - name: lldpd-config
              mountPath: /etc/lldpd.d/
          ports:
            - name: lldp
              containerPort: 5988
              protocol: TCP
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "unifabric.agentName" . }}-config
            items:
              - key: agent.yaml
                path: agent.yaml
        - name: containerd-run
          hostPath:
            path: /run/containerd
            type: Directory
        - name: proc
          hostPath:
            path: /proc
            type: Directory
        {{- if .Values.agent.lldp.enabled }}
        - name: lldpd-state
          emptyDir: {}
        - name: lldpd-config
          configMap:
            name: {{ include "unifabric.agentName" . }}-lldpd
            items:
              - key: lldpd.conf
                path: lldpd.conf
        {{- end }}
{{- end }}
