{{- if .Values.controller.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "unifabric.controllerName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "unifabric.labels" . | nindent 4 }}
    app.kubernetes.io/component: unifabric-controller
spec:
  replicas: {{ .Values.controller.replicaCount }}
  selector:
    matchLabels:
      {{- include "unifabric.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: unifabric-controller
  template:
    metadata:
      labels:
        {{- include "unifabric.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: unifabric-controller
        {{- with .Values.controller.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.controller.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "unifabric.controllerServiceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: controller
          image: {{ include "unifabric.image" (dict "root" . "image" .Values.controller.image) }}
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          args:
            - -config
            - /etc/unifabric/controller.yaml
          ports:
            - name: metrics
              containerPort: {{ .Values.controller.ports.metrics }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.controller.ports.health }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          {{- with .Values.controller.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.controller.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/unifabric
              readOnly: true
          command:
            - /usr/bin/unifabric/controller
      volumes:
        - name: config
          configMap:
            name: {{ include "unifabric.controllerName" . }}-config
            items:
              - key: controller.yaml
                path: controller.yaml
{{- end }}
