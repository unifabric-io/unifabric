---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: topologies.unifabric.io
spec:
  group: unifabric.io
  names:
    kind: Topology
    listKind: TopologyList
    plural: topologies
    shortNames:
    - topo
    singular: topology
  scope: Cluster
  versions:
  - name: v1beta1
    schema:
      openAPIV3Schema:
        description: |-
          Topology is a read-only, cluster-scoped topology view. It intentionally has
          no spec: Node and Switch labels are its only source of truth.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          status:
            properties:
              domains:
                description: Domains is the topology domain forest aggregated from
                  labels.
                items:
                  properties:
                    members:
                      description: Members contains the names of Switch resources
                        carrying this domain.
                      items:
                        type: string
                      type: array
                      x-kubernetes-list-type: set
                    name:
                      description: Name is the value stored in the corresponding Kubernetes
                        topology label.
                      maxLength: 63
                      minLength: 1
                      type: string
                    parent:
                      description: Parent is the directly enclosing performance domain.
                      type: string
                    tier:
                      description: Tier starts at one for the domain nearest to a
                        Kubernetes Node.
                      format: int32
                      minimum: 1
                      type: integer
                  required:
                  - name
                  - tier
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              nodes:
                description: Nodes groups Kubernetes Nodes by their complete domain
                  path.
                items:
                  properties:
                    domainPath:
                      description: DomainPath is ordered from the highest tier to
                        the tier nearest to a Node.
                      items:
                        type: string
                      minItems: 1
                      type: array
                    nodes:
                      description: Nodes contains Kubernetes Nodes that have the same
                        domain path.
                      items:
                        type: string
                      minItems: 1
                      type: array
                      x-kubernetes-list-type: set
                  required:
