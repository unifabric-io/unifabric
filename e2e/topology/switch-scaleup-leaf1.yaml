- header:
    model: vx
    nvue-api-version: nvue_v1
    rev-id: 1.0
    version: Cumulus Linux 5.15.0
- set:
    acl:
      acl-default-whitelist:
        rule:
          '185':
            action:
              permit: {}
            match:
              ip:
                connection-state:
                  established: {}
                  new: {}
                protocol: tcp
                tcp:
                  dest-port:
                    '8090': {}
            remark: permit unifabric switch-agent grpc tcp 8090
    bridge:
      domain:
        br_default:
          untagged: 1
          vlan:
            901,902,903,904: {}
    interface:
      eth0:
        ipv4:
          dhcp-client:
            set-hostname: enabled
            state: enabled
        type: eth
        vrf: mgmt
      swp1-8:
        type: swp
      swp1,5:
        bridge:
          domain:
            br_default:
              access: 901
      swp2,6:
        bridge:
          domain:
            br_default:
              access: 902
      swp3,7:
        bridge:
          domain:
            br_default:
              access: 903
      swp4,8:
        bridge:
          domain:
            br_default:
              access: 904
      vlan901:
        ipv4:
          address:
            172.31.1.1/24: {}
        vlan: 901
      vlan901,902,903,904:
        type: svi
      vlan902:
        ipv4:
          address:
            172.31.2.1/24: {}
        vlan: 902
      vlan903:
        ipv4:
          address:
            172.31.3.1/24: {}
        vlan: 903
      vlan904:
        ipv4:
          address:
            172.31.4.1/24: {}
        vlan: 904
    system:
      aaa:
        class:
          nvapply:
            action: allow
            command-path:
              /:
                permission: all
          nvshow:
            action: allow
            command-path:
              /:
                permission: ro
          sudo:
            action: allow
            command-path:
              /:
                permission: all
        role:
          nvue-admin:
            class:
              nvapply: {}
          nvue-monitor:
            class:
              nvshow: {}
          system-admin:
            class:
              nvapply: {}
              sudo: {}
        user:
          cumulus:
            full-name: cumulus
            # Password is `Dangerous1#`, the plaintext is secure because it is hidden behind a jump server.
            hashed-password: '$6$wUQcsrp2Ci8.eyJu$LBO1RVoVwgwfGkNRUU1HP1xClLkb5hC86cV9dgwGBtQKoT9tFaQ36a4ljBq5JzowD846YBZ5zJW.WI53QxRUr1'
            role: system-admin
      api:
        state: enabled
      config:
        auto-save:
          state: enabled
      control-plane:
        acl:
          acl-default-dos:
            inbound: {}
          acl-default-whitelist:
            inbound: {}
      docker:
        state: enabled
        vrf: mgmt
      hostname: switch-scaleup-leaf1
      ntp:
        server:
          0.cumulusnetworks.pool.ntp.org:
            association-type: server
          1.cumulusnetworks.pool.ntp.org:
            association-type: server
          2.cumulusnetworks.pool.ntp.org:
            association-type: server
          3.cumulusnetworks.pool.ntp.org:
            association-type: server
        vrf: mgmt
      ssh-server:
        state: enabled
      wjh:
        channel:
          forwarding:
            trigger:
              l2: {}
              l3: {}
              tunnel: {}
        state: enabled
