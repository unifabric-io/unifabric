name: PR

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  check:
    name: Check and Prepare
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
      image_namespace: ${{ steps.set_tag.outputs.image_namespace }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check Go license headers
        run: make check-license

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'        

      - name: Check Helm Docs
        run: |
          go install github.com/norwoodj/helm-docs/cmd/helm-docs@latest
          make helm-docs
          
          if [[ -n "$(git status --porcelain chart/README.md)" ]]; then
            git --no-pager diff chart/README.md
            echo "Error: chart/README.md is out of sync with the template and values."
            echo "Please run 'make helm-docs' locally and commit the changes."
            exit 1
          fi
          echo "Helm docs are up to date."
        shell: bash

      - name: Run unit tests
        run: |
          make test-unit

      - name: Set image tag
        id: set_tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_NAMESPACE="${GITHUB_REPOSITORY_OWNER,,}"
          TAG="PR${{ github.event.pull_request.number }}-${SHORT_SHA}-$(date -u +"%Y%m%d")"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "image_namespace=${IMAGE_NAMESPACE}" >> $GITHUB_OUTPUT
        shell: bash

  build-images:
    name: Build Images
    runs-on: ubuntu-latest
    needs: check
    env:
      REGISTRY: ghcr.io
    strategy:
      matrix:
        include:
          - name: unifabric-controller
            dockerfile: image/controller/Dockerfile
          - name: unifabric-agent
            dockerfile: image/agent/Dockerfile
          - name: unifabric-sflow
            dockerfile: image/sflow/Dockerfile
          - name: unifabric-hsflowd
            dockerfile: image/hsflowd/Dockerfile
          - name: unifabric-switch-agent
            dockerfile: image/switch-agent/Dockerfile
    
    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v6

      # Step 2: Set up QEMU
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      # Step 3: Set up Docker
      - name: Set up Docker
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 4: Build and load Docker image into local Docker daemon
      - name: Build and load Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/${{ needs.check.outputs.image_namespace }}/${{ matrix.name }}:${{ needs.check.outputs.tag }}
          push: true

  e2e:
    name: E2E
    needs:
      - check
      - build-images
    uses: ./.github/workflows/e2e.yml
    with:
      image_registry: ghcr.io
      image_namespace: ${{ needs.check.outputs.image_namespace }}
      image_tag: ${{ needs.check.outputs.tag }}
    secrets: inherit
