name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-rc*'
      - 'v*.*.*-r*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
      copilot_model:
        description: 'Copilot model to use'
        required: false

permissions:
  contents: write
  packages: write
  pull-requests: read

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      image_version: ${{ steps.extract_versions.outputs.image_version }}
      helm_version: ${{ steps.extract_versions.outputs.helm_version }}
      image_namespace: ${{ steps.extract_versions.outputs.image_namespace }}

    steps:
      - name: Validate tag format
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ ! "${{ github.event.inputs.tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+((-rc[0-9]+)|(-r[0-9]+))?$ ]]; then
            echo "Invalid tag format"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Extract versions from tag
        id: extract_versions
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            IMAGE_VERSION="${{ github.event.inputs.tag }}"
          else
            IMAGE_VERSION=${GITHUB_REF#refs/tags/}
          fi
          HELM_VERSION=${IMAGE_VERSION#v}
          IMAGE_NAMESPACE="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image_version=${IMAGE_VERSION}" >> $GITHUB_OUTPUT
          echo "helm_version=${HELM_VERSION}" >> $GITHUB_OUTPUT
          echo "image_namespace=${IMAGE_NAMESPACE}" >> $GITHUB_OUTPUT

  build-images:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: prepare
    env:
      REGISTRY: ghcr.io
    strategy:
      matrix:
        include:
          - name: unifabric-controller
            dockerfile: image/controller/Dockerfile
          - name: unifabric-agent
            dockerfile: image/agent/Dockerfile
          - name: unifabric-switch-agent
            dockerfile: image/switch-agent/Dockerfile
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Log in to Image Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.6.0

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          platforms: linux/arm64,linux/amd64
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          provenance: false
          tags: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_namespace }}/${{ matrix.name }}:${{ needs.prepare.outputs.image_version }}

  build-switch-agent-binaries:
    name: Build switch-agent Binary
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        include:
          - goarch: amd64
            artifact_arch: amd64
          - goarch: arm64
            artifact_arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'

      - name: Build switch-agent
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          IMAGE_VERSION: ${{ needs.prepare.outputs.image_version }}
          ARTIFACT_ARCH: ${{ matrix.artifact_arch }}
        run: |
          set -euo pipefail
          artifact="unifabric-switch-agent_${IMAGE_VERSION}_linux_${ARTIFACT_ARCH}"
          mkdir -p "dist/${artifact}"
          go build -trimpath -ldflags="-s -w" -o "dist/${artifact}/unifabric-switch-agent" ./cmd/switch-agent
          {
            echo "# unifabric-switch-agent"
            echo
            echo "Platform: linux/${ARTIFACT_ARCH}"
            echo "Version: ${IMAGE_VERSION}"
            echo
            echo "See docs/usage/switch-agent-systemd.md for systemd installation."
          } > "dist/${artifact}/README.md"
          tar -C dist -czf "dist/${artifact}.tar.gz" "${artifact}"
          (cd dist && sha256sum "${artifact}.tar.gz" > "${artifact}.tar.gz.sha256")

      - name: Upload switch-agent binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: switch-agent-binary-linux-${{ matrix.artifact_arch }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          if-no-files-found: error

  release-notes:
    name: Generate Release Notes
    needs: [prepare, build-images]
    uses: ./.github/workflows/release-notes-generate.yml
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}      
    with:
      tag: ${{ needs.prepare.outputs.image_version }}
      copilot_model: ${{ github.event.inputs.copilot_model || vars.COPILOT_MODEL || 'gpt-5.1-codex-max' }}

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, build-images, build-switch-agent-binaries, release-notes]
    env:
      REGISTRY: ghcr.io
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.19.3

      - name: Update image references in Helm Chart
        uses: mikefarah/yq@master
        env:
          IMAGE_VERSION: ${{ needs.prepare.outputs.image_version }}
          IMAGE_NAMESPACE: ${{ needs.prepare.outputs.image_namespace }}
        with:
          cmd: |
            yq -i '
              .controller.image.registry = "ghcr.io" |
              .controller.image.repository = strenv(IMAGE_NAMESPACE) + "/unifabric-controller" |
              .controller.image.tag = strenv(IMAGE_VERSION) |
              .agent.image.registry = "ghcr.io" |
              .agent.image.repository = strenv(IMAGE_NAMESPACE) + "/unifabric-agent" |
              .agent.image.tag = strenv(IMAGE_VERSION)
            ' ./chart/values.yaml

      - name: Package Helm Chart
        run: helm package ./chart --version ${{ needs.prepare.outputs.helm_version }} --app-version ${{ needs.prepare.outputs.image_version }}

      - name: Generate Helm Chart Checksums
        run: |
          sha256sum ./unifabric-${{ needs.prepare.outputs.helm_version }}.tgz > ./unifabric-${{ needs.prepare.outputs.helm_version }}.tgz.sha256

      - name: Log in to Helm Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Push Helm Chart to GitHub Container Registry
        run: |
          helm push ./unifabric-${{ needs.prepare.outputs.helm_version }}.tgz \
            oci://${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_namespace }}/charts

      - name: Download Release Notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: /tmp/release-notes

      - name: Prepare Release Notes Path
        run: mv /tmp/release-notes/release-notes.md /tmp/release-notes.md

      - name: Download switch-agent binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: switch-agent-binary-*
          path: /tmp/switch-agent-binaries
          merge-multiple: true

      - name: Stage Release Files
        run: |
          mkdir -p release-files
          cp unifabric-${{ needs.prepare.outputs.helm_version }}.tgz release-files/
          cp unifabric-${{ needs.prepare.outputs.helm_version }}.tgz.sha256 release-files/
          cp /tmp/switch-agent-binaries/* release-files/

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          append_body: false
          generate_release_notes: false
          body_path: /tmp/release-notes.md
          files: |
            release-files/*
