name: E2E

on:
  workflow_dispatch:
    inputs:
      topology_dir:
        description: Topology directory passed to nvair create -d
        required: false
        default: e2e/topology
        type: string
      bootstrap_node:
        description: Kubespray bootstrap node
        required: false
        default: node-gpu-1
        type: string
      image_registry:
        description: Image registry
        required: false
        default: ghcr.io
        type: string
      image_namespace:
        description: Image namespace
        required: false
        default: ""
        type: string
      image_tag:
        description: Image tag
        required: false
        default: latest
        type: string
      chart_path:
        description: Helm chart path
        required: false
        default: chart
        type: string
      run_cleanup:
        description: Delete simulation after job
        required: false
        default: true
        type: boolean
      e2e_wait_timeout_minutes:
        description: Timeout minutes for e2e convergence checks
        required: false
        default: 30
        type: number

  workflow_call:
    inputs:
      topology_dir:
        required: false
        default: e2e/topology
        type: string
      bootstrap_node:
        required: false
        default: node-gpu-1
        type: string
      image_registry:
        required: false
        default: ghcr.io
        type: string
      image_namespace:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      chart_path:
        required: false
        default: chart
        type: string
      run_cleanup:
        required: false
        default: true
        type: boolean
      e2e_wait_timeout_minutes:
        required: false
        default: 30
        type: number
    secrets:
      NVAIR_USER:
        required: true
      NVAIR_API_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  e2e:
    name: E2E Validation
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      TOPOLOGY_DIR: ${{ inputs.topology_dir }}
      BOOTSTRAP_NODE: ${{ inputs.bootstrap_node }}
      IMAGE_REGISTRY: ${{ inputs.image_registry }}
      IMAGE_NAMESPACE_INPUT: ${{ inputs.image_namespace }}
      IMAGE_TAG_INPUT: ${{ inputs.image_tag }}
      CHART_PATH: ${{ inputs.chart_path }}
      RUN_CLEANUP: ${{ inputs.run_cleanup }}
      E2E_WAIT_TIMEOUT_MINUTES: ${{ inputs.e2e_wait_timeout_minutes }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v5

      - name: Resolve runtime variables
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${TOPOLOGY_DIR}" ]]; then
            echo "topology_dir cannot be empty" >&2
            exit 1
          fi
          if [[ ! -f "${TOPOLOGY_DIR}/topology.json" ]]; then
            echo "topology.json not found in ${TOPOLOGY_DIR}" >&2
            exit 1
          fi

          SIMULATION_NAME="$(awk -F'"' '/"title"[[:space:]]*:[[:space:]]*"/ { print $4; exit }' "${TOPOLOGY_DIR}/topology.json")"
          if [[ -z "${SIMULATION_NAME}" ]]; then
            echo "failed to parse simulation title from ${TOPOLOGY_DIR}/topology.json" >&2
            exit 1
          fi

          IMAGE_NAMESPACE="${IMAGE_NAMESPACE_INPUT:-}"
          if [[ -z "${IMAGE_NAMESPACE}" ]]; then
            IMAGE_NAMESPACE="${GITHUB_REPOSITORY_OWNER,,}"
          fi

          IMAGE_TAG="${IMAGE_TAG_INPUT:-latest}"
          KUBECONFIG_PATH="${RUNNER_TEMP}/kubeconfig-${SIMULATION_NAME}-external.yaml"
          SWITCH_ARTIFACT_DIR="${TOPOLOGY_DIR}/.artifacts/${SIMULATION_NAME}"

          echo "simulation_name=${SIMULATION_NAME}" >> "${GITHUB_OUTPUT}"
          echo "image_namespace=${IMAGE_NAMESPACE}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "kubeconfig_path=${KUBECONFIG_PATH}" >> "${GITHUB_OUTPUT}"
          echo "switch_artifact_dir=${SWITCH_ARTIFACT_DIR}" >> "${GITHUB_OUTPUT}"

      - name: Install nvair CLI
        shell: bash
        run: |
          set -euo pipefail
          bash hack/install-nvair.sh
          nvair --help >/dev/null

      - name: Login NVIDIA Air
        shell: bash
        env:
          NVAIR_USER: ${{ secrets.NVAIR_USER }}
          NVAIR_API_TOKEN: ${{ secrets.NVAIR_API_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${NVAIR_USER:-}" || -z "${NVAIR_API_TOKEN:-}" ]]; then
            echo "NVAIR_USER and NVAIR_API_TOKEN must be configured." >&2
            exit 1
          fi
          nvair login -u "${NVAIR_USER}" -p "${NVAIR_API_TOKEN}"

      - name: Step 1 - Install topology
        shell: bash
        env:
          KUBECONFIG_FORWARD_OUT: ${{ steps.vars.outputs.kubeconfig_path }}
          DELETE_IF_EXISTS: "true"
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          IMAGE_NAMESPACE: ${{ steps.vars.outputs.image_namespace }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
        run: |
          set -euo pipefail
          bash e2e/topology/setup.sh step1-install-topology --bootstrap-node "${BOOTSTRAP_NODE}" --delete-if-exists
          if [[ ! -f "${KUBECONFIG_FORWARD_OUT}" ]]; then
            echo "kubeconfig not found: ${KUBECONFIG_FORWARD_OUT}" >&2
            exit 1
          fi
          echo "KUBECONFIG=${KUBECONFIG_FORWARD_OUT}" >> "${GITHUB_ENV}"

      - name: Step 2 - Setup RDMA RXE
        shell: bash
        env:
          SIMULATION_NAME: ${{ steps.vars.outputs.simulation_name }}
        run: |
          set -euo pipefail
          bash e2e/topology/setup.sh step2-setup-rdma-rxe --simulation "${SIMULATION_NAME}"

      - name: Step 3 - Install monitoring operators
        shell: bash
        env:
          SIMULATION_NAME: ${{ steps.vars.outputs.simulation_name }}
        run: |
          set -euo pipefail
          bash e2e/topology/setup.sh step3-install-monitoring-operators --simulation "${SIMULATION_NAME}"

      - name: Step 4 - Install Unifabric
        shell: bash
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          IMAGE_NAMESPACE: ${{ steps.vars.outputs.image_namespace }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
        run: |
          set -euo pipefail
          bash e2e/topology/setup.sh step4-install-unifabric

      - name: Step 5 - Deploy switch-agent
        shell: bash
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          IMAGE_NAMESPACE: ${{ steps.vars.outputs.image_namespace }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
          SWITCH_TOPOLOGY_ARTIFACT_DIR: ${{ steps.vars.outputs.switch_artifact_dir }}
          SWITCH_AGENT_IMAGE: ${{ env.IMAGE_REGISTRY }}/${{ steps.vars.outputs.image_namespace }}/unifabric-switch-agent:${{ steps.vars.outputs.image_tag }}
        run: |
          set -euo pipefail
          bash e2e/topology/setup.sh step5-deploy-switch-agent

      - name: Display cluster pods
        shell: bash
        run: |
          set -euo pipefail
          kubectl get pods -A -o wide

      - name: E2E check
        shell: bash
        run: |
          set -euo pipefail
          go run ./e2e \
            --timeout-minutes "${E2E_WAIT_TIMEOUT_MINUTES}" \
            --topology-dir "${TOPOLOGY_DIR}"

      - name: Dump diagnostics on failure
        if: failure()
        shell: bash
        run: |
          set +e
          kubectl get nodes -o wide
          kubectl get pods -A -o wide
          kubectl get events -A --sort-by=.lastTimestamp | tail -n 200
          kubectl get fabricnodes.unifabric.io -o wide
          kubectl get scaleoutleafgroups.unifabric.io -o wide
          kubectl get scaleupleafgroups.unifabric.io -o wide
          kubectl -n unifabric-system logs deploy/unifabric-controller --tail=300
          kubectl -n unifabric-system logs daemonset/unifabric-agent --tail=200

      - name: Cleanup simulation
        if: always() && inputs.run_cleanup
        shell: bash
        env:
          SIMULATION_NAME: ${{ steps.vars.outputs.simulation_name }}
        run: |
          set +e
          nvair delete simulation "${SIMULATION_NAME}"
